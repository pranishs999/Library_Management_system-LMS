{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{{ title }} | LibManager Admin{% endblock %}

{% block branding %}
<div id="site-name" style="display:flex;align-items:center;gap:10px;padding:8px 0;">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#4f46e5);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="18" height="18" fill="white" viewBox="0 0 20 20"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
    </div>
    <a href="{% url 'admin:index' %}" style="font-size:18px;font-weight:700;color:white;text-decoration:none;letter-spacing:-0.3px;">
        LibManager <span style="font-weight:300;opacity:0.8;">Control Panel</span>
    </a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    body, #header, #nav, #main, .module { font-family: 'Inter', sans-serif !important; }
    #header { background: linear-gradient(135deg, #1e3a8a, #1d4ed8, #4f46e5) !important; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
    #header a { color: white !important; }
    #user-tools a, #user-tools { color: rgba(255,255,255,0.85) !important; }
    .module h2, .module caption { background: linear-gradient(135deg, #1d4ed8, #4f46e5) !important; border-radius: 4px 4px 0 0; }
    #nav-sidebar .current-app .section:link, #nav-sidebar .current-app .section:visited { color: #2563eb !important; }
    .button, input[type=submit], input[type=button], .submit-row input { background: #2563eb !important; border: none !important; border-radius: 6px !important; font-family: 'Inter', sans-serif !important; font-weight: 600 !important; }
    .button:hover, input[type=submit]:hover { background: #1d4ed8 !important; }
    a:link { color: #2563eb; }
    #breadcrumbs { background: #f0f4ff; border-bottom: 1px solid #e0e7ff; font-size: 12px; }
    th { font-weight: 600 !important; }
</style>
{% endblock %}
