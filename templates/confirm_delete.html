{% extends 'index.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh] px-4">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-xl overflow-hidden">
            <!-- Danger Header -->
            <div class="px-6 py-5 bg-gradient-to-r from-red-500 to-rose-600">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 backdrop-blur-sm rounded-xl flex items-center justify-center border border-white/30 flex-shrink-0">
                        <svg class="w-5 h-5 text-white text-gray-800 dark:text-white" fill="currentColor" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-white">Confirm Deletion</h2>
                        <p class="text-sm text-red-100">This action is irreversible</p>
                    </div>
                </div>
            </div>

            <!-- Body -->
            <div class="p-6 text-center">
                <!-- Warning Icon -->
                <div class="w-16 h-16 bg-red-50 dark:bg-red-900/20 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-red-100 dark:border-red-900/40">
                    <svg class="w-8 h-8 text-red-500 dark:text-red-400 text-gray-800 dark:text-white" fill="currentColor" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>

                <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2">Are you sure?</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
                    This item will be permanently deleted and cannot be recovered.
                </p>

                <form method="post" class="flex flex-col sm:flex-row items-center justify-center gap-3">
                    {% csrf_token %}
                    <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-2.5 text-sm font-semibold text-white bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-600 hover:to-rose-700 rounded-xl shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5 focus:ring-4 focus:ring-red-300 dark:focus:ring-red-800">
                        <svg class="w-4 h-4 text-gray-800 dark:text-white" fill="currentColor" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                        Yes, Delete It
                    </button>
                    <a href="javascript:history.back()" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-2.5 text-sm font-semibold text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-xl border border-gray-200 dark:border-gray-700 transition-colors">
                        No, Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
